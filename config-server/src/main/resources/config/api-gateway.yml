server:
  port: 8060

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/auth/**

          - id: movies-service
            uri: lb://movies-service
            predicates:
              - Path=/api/movies/**, /api/genres/**, /api/reviews/**