server:
  port: 8082

spring:
  application:
    name: movies-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8088}"
  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 3
        initial-interval: 1000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}