server:
  port: 8761

spring:
  application:
    name: service-registry

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://${EUREKA_HOSTNAME:localhost}:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0